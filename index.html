<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex Ops</title>
    <script>
      window.tailwind = {
        config: {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                apex: {
                  black: 'var(--apex-black)',
                  dark: 'var(--apex-surface)',
                  gold: '#5e6ad2',
                  goldlight: '#7170ff',
                  muted: 'var(--apex-muted)'
                }
              }
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --apex-black: #08090a;
        --apex-surface: #0f1011;
        --apex-muted: #8a8f98;
        --bg-zinc-950: #08090a;
        --bg-zinc-900: #0f1011;
        --border-zinc-800: rgba(255,255,255,0.08);
        --text-zinc-400: #8a8f98;
        --text-main: #f7f8f8;
        --accent: #5e6ad2;
        --accent-hover: #7170ff;
      }
      html.light {
        --apex-black: #f5f5f7;
        --apex-surface: #ffffff;
        --apex-muted: #6e7380;
        --bg-zinc-950: #f0f1f3;
        --bg-zinc-900: #ffffff;
        --border-zinc-800: rgba(0,0,0,0.08);
        --text-zinc-400: #6e7380;
        --text-main: #111214;
        --accent: #5e6ad2;
        --accent-hover: #7170ff;
      }

      /* Override Tailwind Zinc colors */
      .bg-zinc-950 { background-color: var(--bg-zinc-950) !important; }
      .bg-zinc-900 { background-color: var(--bg-zinc-900) !important; }
      .border-zinc-800 { border-color: var(--border-zinc-800) !important; }
      .text-zinc-400 { color: var(--text-zinc-400) !important; }

      body {
        background-color: var(--bg-zinc-950);
        color: var(--text-main);
        transition: background-color 0.3s ease;
        margin: 0; padding: 0; min-height: 100vh;
      }
      /* Subtle grid pattern across entire app */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        opacity: 0.028;
        background-image:
          linear-gradient(rgba(255,255,255,0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px);
        background-size: 36px 36px;
        pointer-events: none;
        z-index: 0;
      }
      /* Radial gradient ambient glow */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 70% 0%, rgba(113,112,255,0.09) 0%, transparent 38%),
          radial-gradient(circle at 10% 90%, rgba(94,106,210,0.07) 0%, transparent 32%);
        pointer-events: none;
        z-index: 0;
      }
      #root { min-height: 100vh; position: relative; z-index: 1; }

      /* Accent color — indigo (replaces gold throughout) */
      .bg-apex-gold { background-color: var(--accent) !important; }
      .text-apex-gold { color: var(--accent) !important; }
      .border-apex-gold { border-color: var(--accent) !important; }
      .hover\:bg-yellow-500:hover { background-color: var(--accent-hover) !important; }
      .hover\:bg-apex-gold:hover { background-color: var(--accent) !important; }
      .hover\:text-apex-gold:hover { color: var(--accent) !important; }
      .group-hover\:text-apex-gold { color: var(--accent); }
      .focus\:border-apex-gold:focus { border-color: var(--accent) !important; }
      .focus\:ring-apex-gold\/50:focus { --tw-ring-color: rgba(94,106,210,0.4); }
      .text-apex-gold\/70 { color: rgba(94,106,210,0.7) !important; }
      .bg-apex-gold\/10 { background-color: rgba(94,106,210,0.1) !important; }
      .bg-apex-gold\/20 { background-color: rgba(94,106,210,0.18) !important; }
      .border-apex-gold\/20 { border-color: rgba(94,106,210,0.2) !important; }
      .border-apex-gold\/30 { border-color: rgba(94,106,210,0.3) !important; }
      .border-apex-gold\/50 { border-color: rgba(94,106,210,0.5) !important; }
      .hover\:border-apex-gold\/50:hover { border-color: rgba(94,106,210,0.5) !important; }
      .shadow-apex-gold\/10 { box-shadow: 0 2px 12px rgba(94,106,210,0.15) !important; }
      .shadow-apex-gold\/20 { box-shadow: 0 4px 20px rgba(94,106,210,0.22) !important; }

      /* Yellow remnants → indigo */
      .bg-yellow-600, .hover\:bg-yellow-600:hover { background-color: var(--accent) !important; }
      .border-yellow-600, .hover\:border-yellow-600:hover { border-color: var(--accent) !important; }
      .text-yellow-500, .text-yellow-400 { color: var(--accent-hover) !important; }

      /* Smooth transitions */
      * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease; }

      /* Error overlay */
      #fatal-error-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; color: #ff4444; z-index: 99999;
        padding: 40px; font-family: monospace; display: none; overflow: auto;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react/jsx-dev-runtime": "https://esm.sh/react@18.2.0/jsx-dev-runtime",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.0?deps=react@18.2.0,react-dom@18.2.0",
    "zustand": "https://esm.sh/zustand@4.5.0?deps=react@18.2.0",
    "i18next": "https://esm.sh/i18next@23.10.0",
    "react-i18next": "https://esm.sh/react-i18next@14.0.0?deps=react@18.2.0,react-dom@18.2.0,i18next@23.10.0",
    "clsx": "https://esm.sh/clsx@2.1.0",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
    "vite": "https://esm.sh/vite@5.1.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@4.2.0",
    "path": "https://esm.sh/path-browserify",
    "url": "https://esm.sh/url",
    "vitest": "https://esm.sh/vitest@^4.0.18",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.8.2?deps=jspdf@2.5.1",
    "jszip": "https://esm.sh/jszip@3.10.1",
    "@/": "./src/",
    "express": "https://esm.sh/express@^5.2.1",
    "cors": "https://esm.sh/cors@^2.8.6",
    "dotenv": "https://esm.sh/dotenv@^17.3.1",
    "nodemailer": "https://esm.sh/nodemailer@^8.0.1"
  }
}
</script>
  </head>
  <body class="bg-zinc-950 text-white">
    <div id="root"></div>
    <div id="fatal-error-overlay">
      <h1 style="font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">FATAL SYSTEM ERROR</h1>
      <pre id="error-content" style="white-space: pre-wrap;"></pre>
      <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer;">RESTART SYSTEM</button>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
